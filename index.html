<html lang="en">
  <head>
    <title>Build-a-Burger</title>
    <link rel="stylesheet" href="style.css" />

  </head>
  <body>
    <h1>The Classic Burger</h1>
    <h2>Only $10.99</h2>

    <!-- 
    Rearrange the elements below to make your own custom burger. 
    Change ingredient colors in the "ingredients.css" file.
    -->

    <div class="burger">
      <div class="bun-top"></div>
      <div class="cheese"></div>
      <div class="tomato"></div>

      <div class="cheese"></div>
      <div class="cheese"></div>
      <div class="onion"></div>
      <div class="meatball"></div>
      <div class="meatball"></div>
      <div class="meatball"></div>
      <div class="pickle"></div>
      <div class="patty"></div>
      <div class="patty"></div>
      <div class="bun-bottom"></div>
      <div class="plate"></div>
    </div>

    <hr />
 
    <h1>The Breakfast Tower Burger</h1>
    <h2>Only $12.99</h2>

    <div class="burger">
      <div class="bun-top2"></div>

      <div class="mayo2"></div>
      <div class="bacon2"></div>
      <div class="egg2"></div>

      <div class="cheese2"></div>
      <div class="patty2"></div>

      <div class="tomato2"></div>
      <div class="pickle2"></div>

      <div class="bacon2"></div>

      <div class="bun-bottom2"></div>
      <div class="plate2"></div>
    </div>

</html>
